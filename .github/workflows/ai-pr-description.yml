name: "\U0001F916 AI PR Description"

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-description:
    name: Generate PR description with Gemini
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff and changed files
        id: meta
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- . \
            ':(exclude)*.lock' \
            ':(exclude)package-lock.json' \
            ':(exclude)*.min.js' \
            ':(exclude)*.min.css' \
            | head -c 8000 > /tmp/pr_diff.txt

          FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | head -50 | tr '\n' ', ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Generate PR description via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_FILES: ${{ steps.meta.outputs.files }}
        run: python3 .github/workflows/generate_pr_description.py

      - name: Update PR description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$(cat /tmp/pr_description.txt)" \
            --repo ${{ github.repository }}
          echo "PR description updated."
