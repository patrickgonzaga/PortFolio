name: "🔍 AI PR Reviewer"

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  code-review:
    name: Run AI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: meta
        run: |
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- . \
            ':(exclude)*.lock' \
            ':(exclude)package-lock.json' \
            ':(exclude)*.min.js' \
            ':(exclude)*.min.css' \
            | head -c 12000 > /tmp/pr_diff.txt

      - name: Generate review comments via AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: python3 .github/workflows/generate_pr_review.py

      - name: Post review comment to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only post if review was successfully generated
          if [ -f /tmp/pr_review.txt ] && ! grep -q "AI Code Review failed" /tmp/pr_review.txt; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "$(cat /tmp/pr_review.txt)" \
              --repo ${{ github.repository }}
            echo "Review comment posted."
          else
            echo "Review generation failed or was skipped."
          fi
